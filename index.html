<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SITTA UT</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="login-container">
      <img
        src="img/logo_ut.jpg"
        alt="Logo Universitas Terbuka"
        class="logo-ut"
        widht="100px"
        height="120px"
      />
      <h2 class="welcome-text">Selamat Datang Di SITTA Online</h2>
      <h4>Sistem Informasi Pemesanan Bahan Ajar</h4>
      <form id="login-form" aria-label="Formulir Masuk Aplikasi SITTA">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="email@ut.ac.id"
        />

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          placeholder="password"
        />

        <button type="submit" id="login-button">Masuk</button>
      </form>

      <p>
        <button class="link-button" id="forgot-password-btn">
          Lupa Password
        </button>
      </p>
      <p>
        Belum Punya Akun?
        <button class="link-button" id="register-btn">Daftar</button>
      </p>
    </main>

    <div
      id="forgot-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="forgot-modal-title"
    >
      <div class="modal-content">
        <span class="close-btn" data-modal="forgot-modal">&times;</span>
        <h3 id="forgot-modal-title">Lupa Password</h3>
        <p>
          Silahkan hubungi administrator SITTA UT online untuk mereset
          passwordnya!.
        </p>
      </div>
    </div>

    <div
      id="register-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="forgot-register-title"
    >
      <div class="modal-content">
        <span class="close-btn" data-modal="forgot-modal">&times;</span>
        <h3 id="register-modal-title">Pendaftaran Akun</h3>
        <p>
          Pendaftaran akun hanya bisa di daftar kan oleh admin atau
          administrator SITTA UT Terima kasih.
        </p>
      </div>
    </div>
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
